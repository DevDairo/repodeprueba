services:
  db:
    image: postgres:17-alpine
    container_name: gestion_poc_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: gestion_poc
      POSTGRES_USER: app_user
      POSTGRES_PASSWORD: app_password
    ports:
      - "5432:5432"
    volumes:
      - gestion_poc_db_data:/var/lib/postgresql/data

volumes:
  gestion_poc_db_data: